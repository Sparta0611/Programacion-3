<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand ">REGISTRO DE EMPRESAS</a>

</nav>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-secondary text-white">
            <h4 class="mb-0">Registrar Proveedor</h4>
        </div>
        <div class="card-body">
            <form id="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate>

                <div class="row">
                    <div class="form-group col-md-4">
                        <label>ID Proveedor (Auto)</label>
                        <input type="text" class="form-control" placeholder="Automático" disabled>
                    </div>
                    <div class="form-group col-md-4">
                        <label>ID Empresa*</label>
                        <input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Estado</label>
                        <select [(ngModel)]="user.estado" name="estado" class="form-control">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-6">
                        <label>Nombre del Proveedor*</label>
                        <input type="text" [(ngModel)]="user.proveedor" name="proveedor" class="form-control" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Responsable / Contacto*</label>
                        <input type="text" [(ngModel)]="user.responsable" name="responsable" class="form-control" required>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-8">
                        <label>Dirección*</label>
                        <input type="text" [(ngModel)]="user.direccion" name="direccion" class="form-control" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Teléfono*</label>
                        <input type="text" [(ngModel)]="user.telefono" name="telefono" class="form-control" required>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-6">
                        <label>Fecha Creación*</label>
                        <input type="date" [(ngModel)]="user.fecha_creacion" name="fecha_creacion" class="form-control" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Observaciones</label>
                        <textarea [(ngModel)]="user.observaciones" name="observaciones" class="form-control" rows="1"></textarea>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-secondary btn-lg" [disabled]="f.invalid">
                         Guardar Proveedor
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="container">
    <div class="row mt-25">
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>proveedor</th>
                    <th>direccion</th>
                    <th>telefono</th>
                    <th>responsable</th>
                    <th>fecha_creacion</th>
                    <th>observaciones</th>
                    <th>estado</th>
                    

                </tr>

            </thead>
            <tbody>

                <tr *ngFor="let User of TUser">
                    <td>{{User.idprov}}</td>
                    <td>{{User.proveedor}}</td>
                    <td>{{User.direccion}}</td>
                    <td>{{User.telefono}}</td>
                    <td>{{User.responsable}}</td>
                    <td>{{User.fecha_creacion| date:'dd/MM/yyyy'}}</td>
                    <td>{{User.observaciones}}</td>
                    <td>{{User.estado}}</td>
                    <td> <button class="btn btn-danger" (click)="EliminarData(User.idprov)"onclick="javascript:alert('Registro Eliminado')">Eliminar</button> </td>
                    <td>
                        <button class="btn btn-success" [routerLink]="['/proveedor/edit', User.idprov]">
                            Actualizar
                        </button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>
