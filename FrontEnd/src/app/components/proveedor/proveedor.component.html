<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand ">REGISTRO DE EMPRESAS</a>

</nav>

<div class="container">
    <div class="row mt-25">
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>proveedor</th>
                    <th>direccion</th>
                    <th>telefono</th>
                    <th>responsable</th>
                    <th>fecha_creacion</th>
                    <th>observaciones</th>
                    <th>estado</th>
                    

                </tr>

            </thead>
            <tbody>

                <tr *ngFor="let User of TUser">
                    <td>{{User.idprov}}</td>
                    <td>{{User.proveedor}}</td>
                    <td>{{User.direccion}}</td>
                    <td>{{User.telefono}}</td>
                    <td>{{User.responsable}}</td>
                    <td>{{User.fecha_creacion| date:'dd/MM/yyyy'}}</td>
                    <td>{{User.observaciones}}</td>
                    <td>{{User.estado}}</td>
                    <td> <button class="btn btn-danger">Eliminar</button> </td>
                    <td>
                        <button class="btn btn-success">Actualizar</button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>
