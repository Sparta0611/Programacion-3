<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE EMPRESAS</a>

</nav>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registrar Encabezado de Compra</h4>
        </div>
        <div class="card-body">
            <form id="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate>

                <div class="row">
                    <div class="form-group col-md-4">
                        <label>Número de Compra*</label>
                        <input type="number" [(ngModel)]="user.num_compra" name="num_compra" class="form-control"
                            required placeholder="Ej: 1001">
                    </div>
                    <div class="form-group col-md-4">
                        <label>ID Empresa*</label>
                        <input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control"
                            required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>ID Sucursal*</label>
                        <input type="number" [(ngModel)]="user.idsuc" name="idsuc" class="form-control" required>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-4">
                        <label>ID Proveedor*</label>
                        <input type="number" [(ngModel)]="user.idprov" name="idprov" class="form-control" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>User ID (Comprador)*</label>
                        <input type="number" [(ngModel)]="user.userid" name="userid" class="form-control" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>ID Forma Pago*</label>
                        <input type="number" [(ngModel)]="user.idfpago" name="idfpago" class="form-control" required>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-6">
                        <label>Fecha de Compra*</label>
                        <input type="date" [(ngModel)]="user.fecha_compra" name="fecha_compra" class="form-control"
                            required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Estado</label>
                        <select [(ngModel)]="user.estado" name="estado" class="form-control">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                            <option value="Anulado">Anulado</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-primary btn-lg" [disabled]="f.invalid">
                        Guardar Encabezado
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mt-25">
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>fecha_compra</th>
                    <th>estado</th>
                    <th>Eliminar</th>
                    <th>Actualizar</th>
                </tr>

            </thead>
            <tbody>

                <tr *ngFor="let User of TUser">
                    <td>{{User.num_compra}}</td>
                    <td>{{User.fecha_compra| date:'dd/MM/yyyy'}}</td>
                    <td>{{ User.estado }}</td>

                    <td> <button class="btn btn-danger" (click)="EliminarData(User.num_compra)"
                            onclick="javascript:alert('Registro Eliminado')">Eliminar</button> </td>
                    <td>
                        <button class="btn btn-success" [routerLink]="['/encabezado-compra/edit', User.num_compra]">
                            Actualizar
                        </button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>
