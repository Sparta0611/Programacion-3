<nav class="navbar navbar-dark bg-primary">
    <a href="/" class="navbar-brand">PRODUCTOS - EDITAR</a>
</nav>

<div class="row mt-5 justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <form>
                    <input type="text" [(ngModel)]="user.num_prod" name="num_prod" hidden>
                    
                    <div class="form-group mb-3">
                        <label>Descripción</label>
                        <input type="text" [(ngModel)]="user.descripcion" name="descripcion" class="form-control">
                    </div>
                    <div class="row">
                        <div class="form-group col-md-6 mb-3">
                            <label>Precio Venta</label>
                            <input type="number" [(ngModel)]="user.precioventa" name="precioventa" class="form-control">
                        </div>
                        <div class="form-group col-md-6 mb-3">
                            <label>Existencia</label>
                            <input type="number" [(ngModel)]="user.existencia" name="existencia" class="form-control">
                        </div>
                    </div>
                    <div class="form-group mb-3">
                        <label>Estado</label>
                        <select [(ngModel)]="user.estado" name="estado" class="form-control">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-block w-100" (click)="updateUser()">
                        Actualizar Producto
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
