<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE EMPRESAS</a>

</nav>

<div class="container">
    <div class="row mt-25">
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>sucursal</th>
                    <th>dirsuc</th>
                    <th>telefono</th>
                    <th>TELEFONO</th>
                    <th>estado</th>
                    

                </tr>

            </thead>
            <tbody>

                <tr *ngFor="let User of TUser">
                    <td>{{User.idsuc}}</td>
                    <td>{{User.sucursal}}</td>
                    <td>{{User.dirsuc}}</td>
                    <td>{{User.telefono}}</td>
                    <td>{{User.estado}}</td>
                    
                    <td> <button class="btn btn-danger">Eliminar</button> </td>
                    <td>
                        <button class="btn btn-success">Actualizar</button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>
