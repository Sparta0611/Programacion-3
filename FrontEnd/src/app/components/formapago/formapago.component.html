<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE EMPRESAS</a>

</nav>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Registrar Forma de Pago</h4>
        </div>
        <div class="card-body">
            <form id="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate>

                <div class="row">
                    <div class="form-group col-md-4">
                        <label>ID Forma Pago (Auto)</label>
                        <input type="text" class="form-control" placeholder="Automático" disabled>
                    </div>

                    <div class="form-group col-md-4">
                        <label>ID Empresa*</label>
                        <input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control"
                            required>
                    </div>

                    <div class="form-group col-md-4">
                        <label>Estado</label>
                        <select [(ngModel)]="user.estado" name="estado" class="form-control">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-12">
                        <label>Descripción Forma de Pago*</label>
                        <input type="text" [(ngModel)]="user.formapago" name="formapago" class="form-control" required
                            placeholder="Ej: Efectivo, Tarjeta, Transferencia">
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-dark btn-lg" [disabled]="f.invalid">
                        Guardar Forma de Pago
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mt-25">
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>formapago</th>
                    <th>Estado</th>
                    <th>Eliminar</th>
                    <th>Actualizar</th>
                </tr>

            </thead>
            <tbody>

                <tr *ngFor="let User of TUser">
                    <td>{{User.idfpago}}</td>
                    <td>{{User.formapago}}</td>
                    <td>{{ User.estado }}</td>

                    <td> <button class="btn btn-danger" (click)="EliminarData(User.idfpago)"
                            onclick="javascript:alert('Registro Eliminado')">Eliminar</button> </td>
                    <td>
                        <button class="btn btn-success" [routerLink]="['/formapago/edit', User.idfpago]">
                            Actualizar
                        </button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>
