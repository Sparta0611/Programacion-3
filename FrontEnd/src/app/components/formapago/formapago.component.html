<div class="container">
    <div class="row mt-25">
        <table class="table table-borbered table-hover">
            <thead>

                    <th>NO</th>
                    <th>formapago</th>
                    <th>Estado</th>
                    <th>Eliminar</th>

            </thead>

                    </td>

            </tbody>
