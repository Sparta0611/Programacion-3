<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand ">REGISTRO DE EMPRESAS</a>

</nav>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Registrar Nuevo Usuario</h4>
        </div>
        <div class="card-body">
            <form id="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate>

                <div class="row">
                    <div class="form-group col-md-3">
                        <label>User ID (Auto)</label>
                        <input type="text" class="form-control" placeholder="Automático" disabled>
                    </div>
                    <div class="form-group col-md-3">
                        <label>ID Empresa*</label>
                        <input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control" required>
                    </div>
                    <div class="form-group col-md-3">
                        <label>ID Sucursal*</label>
                        <input type="number" [(ngModel)]="user.idsuc" name="idsuc" class="form-control" required>
                    </div>
                    <div class="form-group col-md-3">
                        <label>ID Empleado*</label>
                        <input type="number" [(ngModel)]="user.idemp" name="idemp" class="form-control" required>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-4">
                        <label>Nombre de Usuario*</label>
                        <input type="text" [(ngModel)]="user.usuario" name="usuario" class="form-control" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Clave / Password*</label>
                        <input type="password" [(ngModel)]="user.clave" name="clave" class="form-control" required>
                    </div>
                    
                    <div class="form-group col-md-4">
                        <label>Tipo de Usuario (ID)*</label>
                        <input type="number" [(ngModel)]="user.idtpusuario" name="idtpusuario" class="form-control" required>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-4">
                        <label>Estado</label>
                        <select [(ngModel)]="user.estado" name="estado" class="form-control">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-dark btn-lg" [disabled]="f.invalid">
                         Guardar Usuario
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mt-25">
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>usuario</th>
                    <th>clave</th>
                    <th>tipo</th>
                    <th>estado</th>
                    <th>Eliminar</th>
                    <th>Actualizar</th>
                </tr>

            </thead>
            <tbody>

                <tr *ngFor="let User of TUser">
                    <td>{{User.userid}}</td>
                    <td>{{User.usuario}}</td>
                    <td>{{ User.clave }}</td>
                    <td>{{User.tipo}}</td>
                    <td>{{ User.estado }}</td>

                    <td> <button class="btn btn-danger" (click)="EliminarData(User.userid)"onclick="javascript:alert('Registro Eliminado')">Eliminar</button> </td>
                    <td>
                        <button class="btn btn-success" [routerLink]="['/usuario/edit', User.userid]">
                            Actualizar
                        </button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>
