<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE EMPRESAS</a>

</nav>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-secondary text-white">
            <h4 class="mb-0">Registrar Detalle de Compra</h4>
        </div>
        <div class="card-body">
            <form id="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate>

                <div class="row">
                    <div class="form-group col-md-4">
                        <label>ID Empresa*</label>
                        <input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control" required>
                    </div>

                    <div class="form-group col-md-4">
                        <label>ID Sucursal*</label>
                        <input type="number" [(ngModel)]="user.idsuc" name="idsuc" class="form-control" required>
                    </div>

                    <div class="form-group col-md-4">
                        <label>Número de Compra*</label>
                        <input type="number" [(ngModel)]="user.num_compra" name="num_compra" class="form-control" required placeholder="Ej: 8001">
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-4">
                        <label>Num Producto*</label>
                        <input type="number" [(ngModel)]="user.num_prod" name="num_prod" class="form-control" required>
                    </div>

                    <div class="form-group col-md-4">
                        <label>Cantidad*</label>
                        <input type="number" [(ngModel)]="user.cantidad" name="cantidad" class="form-control" required>
                    </div>

                    <div class="form-group col-md-4">
                        <label>Precio Unitario*</label>
                        <input type="number" [(ngModel)]="user.precio" name="precio" class="form-control" required>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="form-group col-md-3">
                        <label>Subtotal*</label>
                        <input type="number" [(ngModel)]="user.subtotal" name="subtotal" class="form-control" required>
                    </div>

                    <div class="form-group col-md-3">
                        <label>ISV</label>
                        <input type="number" [(ngModel)]="user.isv" name="isv" class="form-control">
                    </div>

                    <div class="form-group col-md-3">
                        <label>Total*</label>
                        <input type="number" [(ngModel)]="user.total" name="total" class="form-control" required>
                    </div>

                    <div class="form-group col-md-3">
                        <label>Estado</label>
                        <select [(ngModel)]="user.estado" name="estado" class="form-control">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-secondary btn-lg" [disabled]="f.invalid">
                         Guardar Detalle
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mt-25">
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>Codigo de compra</th>
                    <th>cantidad</th>
                    <th>precio</th>
                    <th>subtotal</th>
                    <th>isv</th>
                    <th>total</th>
                    <th>estado</th>
                    <th>Eliminar</th>
                    <th>Actualizar</th>
                </tr>

            </thead>
            <tbody>

                <tr *ngFor="let User of TUser">
                    <td>{{User.iddetcomp}}</td>
                    <td>{{User.num_compra}}</td>
                    <td>{{User.cantidad}}</td>
                    <td>{{ User.precio }}</td>
                    <td>{{User.subtotal}}</td>
                    <td>{{User.isv}}</td>
                    <td>{{ User.total }}</td>
                    <td>{{User.estado}}</td>
                    <td> <button class="btn btn-danger" (click)="EliminarData(User.iddetcomp)"onclick="javascript:alert('Registro Eliminado')">Eliminar</button> </td>
                    <td>
                        <button class="btn btn-success" [routerLink]="['/detalleCompra/edit', User.iddetcomp]">
                            Actualizar
                        </button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>
